name: Deploy to Firebase Hosting on PR

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/reusable-ci.yml
    with:
      run_lint: true
      run_coverage: ${{ github.base_ref == 'main' }}
    secrets: inherit

  # Feature PRs targeting develop: build and deploy a preview channel
  build_and_preview:
    needs: ci
    if: ${{ github.base_ref == 'develop' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies and build
        run: npm ci && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: remoteshopsupport

  # Release PRs from develop -> main: additional release validation
  release_checks:
    needs: ci
    if: ${{ github.base_ref == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Fetch main branch for comparison
        run: git fetch origin main --depth=1
      - name: Verify source branch is develop
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "::error::Release PRs to main must originate from the develop branch."
            exit 1
          fi
      - name: Check version bump
        run: |
          git show origin/main:package.json > /tmp/main-package.json 2>/dev/null \
            || echo '{"version":"0.0.0"}' > /tmp/main-package.json
          MAIN_VERSION=$(node -p "require('/tmp/main-package.json').version")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "main version:    $MAIN_VERSION"
          echo "current version: $CURRENT_VERSION"
          if [ "$MAIN_VERSION" = "$CURRENT_VERSION" ]; then
            echo "::warning::Version in package.json ($CURRENT_VERSION) has not been bumped from main. Consider updating the version for this release."
          fi
      - name: Check for CHANGELOG updates
        run: |
          if [ -f CHANGELOG.md ]; then
            CHANGED=$(git diff origin/main -- CHANGELOG.md || true)
            if [ -z "$CHANGED" ]; then
              echo "::warning::CHANGELOG.md exists but has not been updated for this release."
            else
              echo "CHANGELOG.md has been updated."
            fi
          else
            echo "::notice::No CHANGELOG.md found. Consider adding one to track release notes."
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run coverage threshold check
        run: npm run test:coverage
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
